name: roundu_provider
description: RoundU Service Provider App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  provider: ^6.1.2
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  pin_code_fields: ^8.0.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
